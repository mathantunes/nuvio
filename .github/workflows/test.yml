name: Test

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  pull_request:
    paths:
      - "web/**"

jobs:
  unit:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nuvio
          POSTGRES_PASSWORD: nuvio
          POSTGRES_DB: nuvio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nuvio:nuvio@localhost:5432/nuvio_test
      SESSION_SECRET: playwright-test-secret-32-chars-long
      TEST_EMAIL: test@nuvio.local
      TEST_PASSWORD: testpassword123
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Seed test user
        run: npx tsx scripts/create-initial-user.ts "$TEST_EMAIL" "$TEST_PASSWORD"

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
