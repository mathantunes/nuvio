name: Test

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  pull_request:
    paths:
      - "web/**"

jobs:
  test:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
