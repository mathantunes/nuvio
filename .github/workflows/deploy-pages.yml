name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "waitlist/**"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-flight if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: waitlist

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: waitlist/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set BASE_PATH when using a GitHub Pages project site URL
          # (e.g. mathantunes.github.io/nuvio). Leave empty when using
          # a custom domain (nuvio.app).
          BASE_PATH: "/nuvio"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: waitlist/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
